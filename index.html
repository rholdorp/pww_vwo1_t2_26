<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studieplan Stijn – PW maart 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0c0c20,#141432 40%,#0e0e28);font-family:'Nunito',sans-serif;color:#ddd;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:400px;width:100%;text-align:center}
h1{font-size:28px;font-weight:900;margin-bottom:4px;background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#6bcb77);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#777;font-size:14px;margin-bottom:32px}
.card{display:block;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;margin-bottom:14px;text-decoration:none;color:#ddd;transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.card .icon{font-size:36px;margin-bottom:10px}
.card .title{font-size:18px;font-weight:800;margin-bottom:4px}
.card .desc{font-size:13px;color:#888}
.footer{margin-top:24px;font-size:11px;color:#444}
</style>
</head>
<body>
<div class="container">
  <div style="font-size:48px;margin-bottom:12px">📚</div>
  <h1>Studieplan Stijn</h1>
  <div class="sub">Proefwerkweek maart 2026</div>

  <a href="trainer.html" class="card">
    <div class="icon">🧮</div>
    <div class="title">Wiskunde H6 Trainer</div>
    <div class="desc">Theorie leren + oefenen met 3 niveaus</div>
  </a>

  <a href="dashboard.html" class="card">
    <div class="icon">📋</div>
    <div class="title">Studieplan Dashboard</div>
    <div class="desc">Dagplanning afvinken + voortgang bijhouden</div>
  </a>

  <div class="footer">Gemaakt door papa 💪</div>
</div>
</body>
</html>
