function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

function genQs(secId){
  const pool=QUESTIONS[secId]||[];
  return shuffle(pool).slice(0,10).map(q=>{
    const opts=shuffle(q.opts);
    return{q:q.q,opts,correct:opts.indexOf(q.a)};
  });
}

function App(){
  const[version,setVersion]=useState(0);
  useEffect(()=>{progress.onUpdate(()=>setVersion(v=>v+1));},[]);
  const[screen,setScreen]=useState("home"); // home|theory|practice|results
  const[secId,setSecId]=useState(null);
  const[theoryIdx,setTheoryIdx]=useState(0);
  const[questions,setQuestions]=useState([]);
  const[qIdx,setQIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[score,setScore]=useState(0);
  const[answers,setAnswers]=useState([]);
  const[stats,setStats]=useState(()=>progress.getOverallStats());
  const[dashTaskId,setDashTaskId]=useState(null);
  const[dashDate,setDashDate]=useState(null);

  const refreshStats=()=>setStats(progress.getOverallStats());

  // Deep link support
  useEffect(()=>{
    const dp=DashboardLink.readParams();if(!dp)return;
    if(dp.taskId)setDashTaskId(dp.taskId);
    if(dp.date)setDashDate(dp.date);
    if(dp.section&&SECTIONS.find(s=>s.id===dp.section)){
      openSection(dp.section,dp.mode==="theory"?"theory":"practice");
    }
  },[]);

  const openSection=(id,mode)=>{
    setSecId(id);
    setTheoryIdx(0);
    if(id==="samenvatting"){
      setScreen("samenvatting");
      return;
    }
    if(mode==="theory"){
      setScreen("theory");
    } else {
      const qs=genQs(id);
      setQuestions(qs);
      setQIdx(0);
      setSelected(null);
      setScore(0);
      setAnswers([]);
      setScreen("practice");
    }
  };

  const nextTheory=()=>{
    const cards=THEORY[secId]||[];
    if(theoryIdx<cards.length-1){setTheoryIdx(theoryIdx+1);}
    else{progress.markTheoryDone(secId);refreshStats();setScreen("home");}
  };

  const selectAnswer=(i)=>{
    if(selected!==null)return;
    setSelected(i);
    const correct=questions[qIdx].correct;
    const isOk=i===correct;
    if(isOk)setScore(s=>s+1);
    progress.recordAnswer(secId,isOk);
    setAnswers(a=>[...a,{q:questions[qIdx].q,chosen:questions[qIdx].opts[i],correct:questions[qIdx].opts[correct],ok:isOk}]);
  };

  const nextQ=()=>{
    if(qIdx<questions.length-1){setQIdx(q=>q+1);setSelected(null);}
    else{progress.saveLastQuiz(secId,score,questions.length);refreshStats();setScreen("results");}
  };

  const {tag, pBar} = window.TrainerUI;

  // ===== HOME =====
  if(screen==="home") return React.createElement("div",{style:{minHeight:"100vh"}},
    React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
      DashboardLink.backLink(dashDate),
      React.createElement("div",{style:{fontSize:16,fontWeight:900,color:COL}},"\u{1F3DB}\uFE0F Geschiedenis"),
      React.createElement("div",{style:{fontSize:12,color:"#555"}},"H4 Het Romeinse Rijk")),
