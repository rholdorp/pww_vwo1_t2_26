// ===== QUESTION GENERATORS =====
function genVerbQs(n=10) {
  const pool = [...VERBS].sort(()=>Math.random()-0.5).slice(0,n);
  return pool.map(([nl,fr])=>{
    const wrongs = VERBS.filter(v=>v[1]!==fr).sort(()=>Math.random()-0.5).slice(0,3).map(v=>v[1]);
    const opts = [fr,...wrongs].sort(()=>Math.random()-0.5);
    return {q:"Vertaal: "+nl,o:opts,c:opts.indexOf(fr),secId:"werkwoorden"};
  });
}

function genEtreQs() {
  const qs = ETRE.map(([subj,form,nl])=>{
    const wrongs = ["suis","es","est","sommes","êtes","sont"].filter(f=>f!==form);
    const picks = wrongs.sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [form,...picks].sort(()=>Math.random()-0.5);
    return {q:subj+" _____ (être)\n"+nl,o:opts,c:opts.indexOf(form),secId:"etre"};
  });
  return qs.sort(()=>Math.random()-0.5);
}

function genAvoirQs() {
  const qs = AVOIR.map(([subj,form,nl])=>{
    const wrongs = ["ai","as","a","avons","avez","ont"].filter(f=>f!==form);
    const picks = wrongs.sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [form,...picks].sort(()=>Math.random()-0.5);
    return {q:subj+" _____ (avoir)\n"+nl,o:opts,c:opts.indexOf(form),secId:"avoir"};
  });
  return qs.sort(()=>Math.random()-0.5);
}

function genBezQs() {
  const qs = [];
  // Type 1: kies juiste vorm
  const cases = [
    {zin:"___ livres sont dans l'armoire.",nl:"jouw",answer:"tes",opts:["ton","ta","tes","son"]},
    {zin:"___ maison est belle.",nl:"zijn/haar",answer:"sa",opts:["son","sa","ses","ma"]},
    {zin:"___ notes sont très bonnes.",nl:"onze",answer:"nos",opts:["notre","nos","votre","vos"]},
    {zin:"___ chien n'aime pas les biscuits.",nl:"hun",answer:"leur",opts:["leur","leurs","son","ses"]},
    {zin:"___ papa travaille beaucoup.",nl:"haar",answer:"son",opts:["son","sa","ses","mon"]},
    {zin:"___ chat est noir.",nl:"mijn",answer:"mon",opts:["mon","ma","mes","ton"]},
    {zin:"___ classe est grande.",nl:"onze",answer:"notre",opts:["notre","nos","votre","mon"]},
    {zin:"___ enfants sont gentils.",nl:"hun",answer:"leurs",opts:["leur","leurs","nos","ses"]},
    {zin:"___ mère est gentille.",nl:"jouw",answer:"ta",opts:["ton","ta","tes","sa"]},
    {zin:"___ livre est intéressant.",nl:"mijn",answer:"mon",opts:["mon","ma","mes","son"]},
  ];
  cases.forEach(c=>{
    const opts = c.opts.sort(()=>Math.random()-0.5);
    qs.push({q:"("+c.nl+") "+c.zin,o:opts,c:opts.indexOf(c.answer),secId:"bezittelijk"});
  });
  return qs.sort(()=>Math.random()-0.5).slice(0,8);
}

function genVocQs(n=10) {
  const pool = [...VOC131].sort(()=>Math.random()-0.5).slice(0,n);
  return pool.map(([fr,nl])=>{
    // Random direction
    if (Math.random()>0.5) {
      // FR -> NL
      const wrongs = VOC131.filter(v=>v[1]!==nl).sort(()=>Math.random()-0.5).slice(0,3).map(v=>v[1]);
      const opts = [nl,...wrongs].sort(()=>Math.random()-0.5);
      return {q:"Wat betekent: "+fr+" ?",o:opts,c:opts.indexOf(nl),secId:"vocabulaire"};
    } else {
      // NL -> FR
      const wrongs = VOC131.filter(v=>v[0]!==fr).sort(()=>Math.random()-0.5).slice(0,3).map(v=>v[0]);
      const opts = [fr,...wrongs].sort(()=>Math.random()-0.5);
      return {q:"Vertaal: "+nl,o:opts,c:opts.indexOf(fr),secId:"vocabulaire"};
    }
  });
}

function genDtoetsQs() {
  // Mix of all types like the real D-toets
  const qs = [];
  // 3 verb questions
  qs.push(...genVerbQs(3));
  // 2 être
  qs.push(...genEtreQs().slice(0,2));
  // 2 avoir
  qs.push(...genAvoirQs().slice(0,2));
  // 3 bezittelijk
  qs.push(...genBezQs().slice(0,3));
  // 3 vocabulaire
  qs.push(...genVocQs(3));
  // Extra toets-style questions
  qs.push(
    {q:"Hoe zeg je 'De tekening is goed' in het Frans?",o:["Le dessin est bon.","La dessin est bon.","Le dessin est bien.","Le dessiner est bon."],c:0,secId:"vocabulaire"},
    {q:"Kies het juiste woord: Le contrôle est ___",o:["donc","facile","chez","vrai"],c:1,secId:"vocabulaire"},
    {q:"Kies het juiste woord: C'est ___?",o:["chez","vrai","donc","avant"],c:1,secId:"vocabulaire"},
    {q:"Hoe zeg je 'Het is warm' in het Frans?",o:["Il fait chaud","Il est chaud","C'est chaud","Il a chaud"],c:0,secId:"vocabulaire"},
    {q:"Hoe zeg je 'iedereen' in het Frans?",o:["tout le monde","tous les gens","chaque personne","les personnes"],c:0,secId:"vocabulaire"},
    {q:"Hoe zeg je 'Het cijfer is slecht' in het Frans?",o:["La note est mauvaise.","Le note est mauvais.","La note est mal.","Le cifre est slecht."],c:0,secId:"vocabulaire"},
  );
  return qs.sort(()=>Math.random()-0.5).slice(0,15);
}

// ===== MAIN APP =====

  const getSt=(id)=>{const s=progress.getSection(id);return{...s,mastered:progress.isMastered(id),pct:s.total>0?Math.round(s.correct/s.total*100):0}};
  const overall=progress.getOverallStats();

  const startTheory=(secId)=>{setActiveSec(secId);setStep(0);setMode("theory")};
  const startPractice=(secId)=>{
    setActiveSec(secId);
    let qs;
    switch(secId){
      case"werkwoorden":qs=genVerbQs(10);break;
      case"etre":qs=genEtreQs();break;
      case"avoir":qs=genAvoirQs();break;
      case"bezittelijk":qs=genBezQs();break;
      case"vocabulaire":qs=genVocQs(10);break;
      case"dtoets":qs=genDtoetsQs();break;

    }
    setQuestions(qs);setQIdx(0);setScore({correct:0,total:0});setAnswered(null);setQuizMode("practice");setMode("practice");
  };

  const handleAnswer=(i)=>{
    if(answered!==null)return;
    const q=questions[qIdx];const correct=i===q.c;setAnswered(i);
    progress.recordAnswer(q.secId||activeSec,correct);
    setScore(s=>({correct:s.correct+(correct?1:0),total:s.total+1}));forceUpdate(n=>n+1);
  };
  const nextQ=()=>{if(qIdx+1<questions.length){setQIdx(qIdx+1);setAnswered(null)}else setMode("results")};

      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"16px 14px 60px"}},
        // Overall

  }

  // ===== THEORY =====
  if(mode==="theory"){
    const steps=THEORY[activeSec];const sec=SECTIONS.find(s=>s.id===activeSec);
    const cs=steps[step];const isLast=step===steps.length-1;
    const renderText=(text)=>text.split("\n").map((line,i)=>{
      const parts=line.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
      return React.createElement("div",{key:i,style:{marginBottom:line===""?"8px":"4px"}},
        parts.map((p,j)=>{
          if(p.startsWith("**")&&p.endsWith("**"))return React.createElement("strong",{key:j,style:{color:"#fff"}},p.slice(2,-2));
          if(p.startsWith("*")&&p.endsWith("*"))return React.createElement("em",{key:j,style:{color:COL}},p.slice(1,-1));
          return React.createElement("span",{key:j},p);
        }));
    });

    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
        React.createElement("button",{style:{background:"none",border:"none",color:"#666",fontSize:"16px"},onClick:()=>setMode("home")},"✕"),
        React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:COL}},sec.icon+" "+sec.title),
        React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(step+1)+"/"+steps.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        pBar(((step+1)/steps.length)*100,COL,"4px"),
        React.createElement("div",{key:step,className:"fade-in",style:{marginTop:"20px"}},
          cs.type==="explain"&&React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr}},
            React.createElement("div",{style:{fontSize:"12px",color:COL,fontWeight:700,marginBottom:"6px"}},"📖 THEORIE"),
            React.createElement("div",{style:{fontSize:"18px",fontWeight:800,marginBottom:"12px"}},cs.title),
            React.createElement("div",{style:{fontSize:"14px",lineHeight:1.8,color:"#ccc"}},renderText(cs.text))),
          cs.type==="example"&&React.createElement("div",{style:{background:COL+"12",borderRadius:"16px",padding:"20px",border:"1px solid "+COL+"25"}},
            React.createElement("div",{style:{fontSize:"12px",color:COL,fontWeight:700,marginBottom:"6px"}},"💡 VOORBEELD"),
            React.createElement("div",{style:{fontSize:"16px",fontWeight:800,marginBottom:"12px"}},cs.title),
            React.createElement("div",{style:{fontSize:"14px",lineHeight:1.8,color:"#ccc"}},renderText(cs.text))),
          cs.type==="check"&&React.createElement(ThCheck,{step:cs,secId:activeSec}),
          React.createElement("div",{style:{display:"flex",gap:"8px",marginTop:"20px"}},
            step>0&&React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"rgba(255,255,255,0.06)",color:"#999",fontSize:"14px",fontWeight:700},onClick:()=>setStep(step-1)},"← Vorige"),
            React.createElement("button",{style:{flex:2,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#fff",fontSize:"14px",fontWeight:800},onClick:()=>{
              if(isLast){progress.markTheoryDone(activeSec);forceUpdate(n=>n+1);setMode("home")}else setStep(step+1)
            }},isLast?"✅ Theorie afgerond!":"Volgende →"))
        )));
  }

  // ===== PRACTICE =====
  if(mode==="practice"){
    const q=questions[qIdx];const sec=activeSec?SECTIONS.find(s=>s.id===activeSec):null;
    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
        React.createElement("button",{style:{background:"none",border:"none",color:"#666",fontSize:"16px"},onClick:()=>setMode("home")},"✕"),
        React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:COL}},sec?sec.icon+" "+sec.title:"🇫🇷 Frans"),
        React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(qIdx+1)+"/"+questions.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        pBar(((qIdx+1)/questions.length)*100,COL,"4px"),
        React.createElement("div",{style:{display:"flex",justifyContent:"center",gap:"16px",marginTop:"12px",marginBottom:"16px"}},
          React.createElement("span",{style:{fontSize:"13px",color:"#6bcb77"}},"✓ "+score.correct),
          React.createElement("span",{style:{fontSize:"13px",color:"#ff6b6b"}},"✕ "+(score.total-score.correct))),
        React.createElement("div",{key:qIdx,className:"fade-in"},
          React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr,marginBottom:"16px"}},
            React.createElement("div",{style:{fontSize:"16px",fontWeight:700,lineHeight:1.6,whiteSpace:"pre-line"}},q.q)),
          q.o.map((opt,i)=>{
            const isC=i===q.c,isSel=answered===i,show=answered!==null;
            let bg=cBg,b2=bdr,col="#ccc";
            if(show&&isC){bg="rgba(107,203,119,0.15)";b2="#6bcb7750";col="#6bcb77"}
            else if(show&&isSel&&!isC){bg="rgba(255,107,107,0.15)";b2="#ff6b6b50";col="#ff6b6b"}
            return React.createElement("button",{key:i,style:{width:"100%",padding:"14px 16px",borderRadius:"12px",border:"1px solid "+b2,background:bg,color:col,fontSize:"14px",fontWeight:600,textAlign:"left",marginBottom:"8px"},onClick:()=>handleAnswer(i)},
              (show&&isC?"✅ ":show&&isSel?"❌ ":"")+opt)}),
          answered!==null&&React.createElement("button",{style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:COL,color:"#fff",fontSize:"15px",fontWeight:800,marginTop:"8px"},onClick:nextQ},
            qIdx+1<questions.length?"Volgende vraag →":"Bekijk resultaat"))));
  }

  // ===== RESULTS =====
  if(mode==="results"){
    const pct=score.total>0?Math.round(score.correct/score.total*100):0;const passed=pct>=70;
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("div",{style:{maxWidth:"400px",padding:"20px",textAlign:"center"}},
        React.createElement("div",{style:{fontSize:"64px",marginBottom:"16px"}},passed?"🎉":"💪"),
        React.createElement("div",{style:{fontSize:"24px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},passed?"Très bien!":"Continue!"),
        React.createElement("div",{style:{fontSize:"48px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},pct+"%"),
        React.createElement("div",{style:{fontSize:"15px",color:"#999",marginBottom:"24px"}},score.correct+" van "+score.total+" correct"),
        React.createElement("div",{style:{display:"flex",gap:"8px"}},
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"rgba(255,255,255,0.06)",color:"#999",fontSize:"14px",fontWeight:700},onClick:()=>setMode("home")},"← Terug"),
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#fff",fontSize:"14px",fontWeight:800},onClick:()=>startPractice(activeSec)},"Opnieuw"))));
  }
  return null;
}

function ThCheck({step,secId}){
  const[picked,setPicked]=useState(null);
  const handle=(i)=>{if(picked!==null)return;setPicked(i);progress.recordAnswer(secId,i===step.correct)};
  return React.createElement("div",{style:{background:"rgba(77,150,255,0.08)",borderRadius:"16px",padding:"20px",border:"1px solid rgba(77,150,255,0.2)"}},
    React.createElement("div",{style:{fontSize:"12px",color:"#4d96ff",fontWeight:700,marginBottom:"6px"}},"❓ CHECK"),
    React.createElement("div",{style:{fontSize:"16px",fontWeight:700,marginBottom:"14px"}},step.question),
    step.options.map((opt,i)=>{
      const c=i===step.correct,s=picked===i,sh=picked!==null;
      let bg=cBg,b=bdr,cl="#ccc";
      if(sh&&c){bg="rgba(107,203,119,0.15)";b="#6bcb7750";cl="#6bcb77"}
      else if(sh&&s&&!c){bg="rgba(255,107,107,0.15)";b="#ff6b6b50";cl="#ff6b6b"}
      return React.createElement("button",{key:i,style:{width:"100%",padding:"12px 14px",borderRadius:"10px",border:"1px solid "+b,background:bg,color:cl,fontSize:"13px",fontWeight:600,textAlign:"left",marginBottom:"6px"},onClick:()=>handle(i)},
        (sh&&c?"✅ ":sh&&s?"❌ ":"")+opt)}));
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
