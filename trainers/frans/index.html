// ===== NORMALIZE =====
function normalize(s){
  return s.toLowerCase().trim()
    .replace(/[''\u0060]/g,"'")
    .replace(/\s+/g," ")
    .replace(/[.!?,;:]+$/,"");
}

function checkAnswer(input, correctStr){
  const inp = normalize(input);
  if(!inp) return false;
  // Allow multiple correct answers separated by /
  const alts = correctStr.split("/").map(a=>normalize(a.trim()));
  if(alts.some(a=>a===inp)) return true;
  // Strip parentheticals from correct for lenient check: "lievelings-" matches "lievelings"
  if(alts.some(a=>{
    const base = normalize(a.replace(new RegExp("\\s*\\([^)]*\\)","g"),"").replace(/-$/,""));
    return base && base === inp;
  })) return true;
  return false;
}

// ===== QUESTION GENERATORS (now return {q, a, secId}) =====
function genVerbQs(n=10){
  return [...VERBS].sort(()=>Math.random()-0.5).slice(0,n)
    .map(([nl,fr])=>({q:"Vertaal naar het Frans:\n"+nl, a:fr, secId:"werkwoorden"}));
}

function genEtreQs(){
  return [...ETRE].sort(()=>Math.random()-0.5)
    .map(([subj,form,nl])=>({q:subj+" _____ (être)  –  "+nl, a:form, secId:"etre"}));
}

function genAvoirQs(){
  return [...AVOIR].sort(()=>Math.random()-0.5)
    .map(([subj,form,nl])=>({q:subj+" _____ (avoir)  –  "+nl, a:form, secId:"avoir"}));
}

function genBezQs(n=8){
  return [...BEZ_CASES].sort(()=>Math.random()-0.5).slice(0,n)
    .map(c=>({q:"("+c.nl+")  "+c.zin, a:c.a, secId:"bezittelijk"}));
}

function genVocQs(n=12){
  return [...VOC131].sort(()=>Math.random()-0.5).slice(0,n)
    .map(([fr,nl])=>{
      if(Math.random()>0.5)
        return {q:"Wat betekent:  "+fr, a:nl, secId:"vocabulaire"};
      else
        return {q:"Vertaal naar het Frans:  "+nl, a:fr, secId:"vocabulaire"};
    });
}

function genDtoetsQs(){
  const qs = [
    ...genVerbQs(4),
    ...genEtreQs().slice(0,3),
    ...genAvoirQs().slice(0,3),
    ...genBezQs(3),

    {q:"Hoe zeg je 'Wat is je lievelingsvak?' in het Frans?", a:"Quelle est ta matière préférée?", secId:"vocabulaire"},
  ];
  return qs.sort(()=>Math.random()-0.5).slice(0,15);
}

    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
        React.createElement("button",{style:{background:"none",border:"none",color:"#666",fontSize:"16px"},onClick:()=>setMode("home")},"✕"),
        React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:COL}},sec.icon+" "+sec.title),
        React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(step+1)+"/"+steps.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        pBar(((step+1)/steps.length)*100,COL,"4px"),
        React.createElement("div",{key:step,className:"fade-in",style:{marginTop:"20px"}},
          cs.type==="explain"&&React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr}},
            React.createElement("div",{style:{fontSize:"12px",color:COL,fontWeight:700,marginBottom:"6px"}},"📖 THEORIE"),
            React.createElement("div",{style:{fontSize:"18px",fontWeight:800,marginBottom:"12px"}},cs.title),
            React.createElement("div",{style:{fontSize:"14px",lineHeight:1.8,color:"#ccc"}},renderText(cs.text))),
          cs.type==="example"&&React.createElement("div",{style:{background:COL+"12",borderRadius:"16px",padding:"20px",border:"1px solid "+COL+"25"}},
            React.createElement("div",{style:{fontSize:"12px",color:COL,fontWeight:700,marginBottom:"6px"}},"💡 VOORBEELD"),
            React.createElement("div",{style:{fontSize:"16px",fontWeight:800,marginBottom:"12px"}},cs.title),
            React.createElement("div",{style:{fontSize:"14px",lineHeight:1.8,color:"#ccc"}},renderText(cs.text))),
          cs.type==="check"&&React.createElement(ThCheck,{step:cs,secId:activeSec}),
          React.createElement("div",{style:{display:"flex",gap:"8px",marginTop:"20px"}},
            step>0&&React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"rgba(255,255,255,0.06)",color:"#999",fontSize:"14px",fontWeight:700},onClick:()=>setStep(step-1)},"← Vorige"),
            React.createElement("button",{style:{flex:2,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#fff",fontSize:"14px",fontWeight:800},onClick:()=>{
              if(isLast){progress.markTheoryDone(activeSec);forceUpdate(n=>n+1);setMode("home")}else setStep(step+1)
            }},isLast?"✅ Theorie afgerond!":"Volgende →"))
        )));
  }

  // ===== PRACTICE =====
  if(mode==="practice"){
    const q=questions[qIdx];const sec=activeSec?SECTIONS.find(s=>s.id===activeSec):null;
    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
        React.createElement("button",{style:{background:"none",border:"none",color:"#666",fontSize:"16px"},onClick:()=>setMode("home")},"✕"),
        React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:COL}},sec?sec.icon+" "+sec.title:"🇫🇷 Frans"),
        React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(qIdx+1)+"/"+questions.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        pBar(((qIdx+1)/questions.length)*100,COL,"4px"),
        React.createElement("div",{style:{display:"flex",justifyContent:"center",gap:"16px",marginTop:"12px",marginBottom:"16px"}},
          React.createElement("span",{style:{fontSize:"13px",color:"#6bcb77"}},"✓ "+score.correct),
          React.createElement("span",{style:{fontSize:"13px",color:"#ff6b6b"}},"✕ "+(score.total-score.correct))),
        React.createElement("div",{key:qIdx,className:"fade-in"},
          React.createElement(TypeQuestion,{q,answered,onAnswer:handleAnswer,onNext:nextQ,isLast:qIdx+1>=questions.length,col:COL}))));
  }

  // ===== RESULTS =====
  if(mode==="results"){
    const pct=score.total>0?Math.round(score.correct/score.total*100):0;const passed=pct>=70;
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("div",{style:{maxWidth:"400px",padding:"20px",textAlign:"center"}},
        React.createElement("div",{style:{fontSize:"64px",marginBottom:"16px"}},passed?"🎉":"💪"),
        React.createElement("div",{style:{fontSize:"24px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},passed?"Très bien!":"Continue!"),
        React.createElement("div",{style:{fontSize:"48px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},pct+"%"),
        React.createElement("div",{style:{fontSize:"15px",color:"#999",marginBottom:"24px"}},score.correct+" van "+score.total+" correct"),
        React.createElement("div",{style:{display:"flex",gap:"8px"}},
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"rgba(255,255,255,0.06)",color:"#999",fontSize:"14px",fontWeight:700},onClick:()=>setMode("home")},"← Terug"),
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#fff",fontSize:"14px",fontWeight:800},onClick:()=>startPractice(activeSec)},"Opnieuw"))));
  }
  return null;
}

// ===== TYPE QUESTION COMPONENT =====
function TypeQuestion({q, answered, onAnswer, onNext, isLast, col}){
  const[input,setInput]=useState("");
  const inputRef=useRef(null);

  useEffect(()=>{setInput("");if(inputRef.current)inputRef.current.focus()},[q]);

  const submit=()=>{if(!input.trim()||answered)return;onAnswer(input)};
  const handleKey=(e)=>{if(e.key==="Enter")answered?onNext():submit()};

  const cls=answered?(answered.ok?"correct":"wrong"):"";

  return React.createElement("div",null,
    React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr,marginBottom:"16px"}},
      React.createElement("div",{style:{fontSize:"16px",fontWeight:700,lineHeight:1.6,whiteSpace:"pre-line",color:"#fff"}},q.q)),
    React.createElement("input",{
      ref:inputRef, type:"text", className:cls, value:input,
      onChange:e=>setInput(e.target.value),
      onKeyDown:handleKey,
      placeholder:"Typ je antwoord...",
      disabled:!!answered,
      style:{marginBottom:"10px"}}),
    answered&&React.createElement("div",{style:{borderRadius:"12px",padding:"14px 16px",marginBottom:"12px",background:answered.ok?"rgba(107,203,119,0.12)":"rgba(255,107,107,0.12)",border:"1px solid "+(answered.ok?"rgba(107,203,119,0.3)":"rgba(255,107,107,0.3)")}},
      React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:answered.ok?"#6bcb77":"#ff6b6b",marginBottom:answered.ok?0:6}},answered.ok?"✓ Goed!":"✗ Fout"),
      !answered.ok&&React.createElement("div",{style:{fontSize:"15px",color:"#fff",fontWeight:700}},answered.correct)),
    !answered
      ?React.createElement("button",{
          style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:col,color:"#fff",fontSize:"15px",fontWeight:800},
          onClick:submit},"Controleer →")
      :React.createElement("button",{
          style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:col,color:"#fff",fontSize:"15px",fontWeight:800},
          onClick:onNext},
          isLast?"Bekijk resultaat":"Volgende vraag →"));
}

// ===== THEORY CHECK (type-in) =====
function ThCheck({step,secId}){
  const[input,setInput]=useState("");
  const[result,setResult]=useState(null);
  const inputRef=useRef(null);
  useEffect(()=>{if(inputRef.current)inputRef.current.focus()},[]);

  const submit=()=>{
    if(!input.trim()||result)return;
    const ok=checkAnswer(input,step.answer);
    setResult({ok,correct:step.answer});
    progress.recordAnswer(secId,ok);
  };
  const handleKey=(e)=>{if(e.key==="Enter")submit()};
  const cls=result?(result.ok?"correct":"wrong"):"";

  return React.createElement("div",{style:{background:"rgba(77,150,255,0.08)",borderRadius:"16px",padding:"20px",border:"1px solid rgba(77,150,255,0.2)"}},
    React.createElement("div",{style:{fontSize:"12px",color:"#4d96ff",fontWeight:700,marginBottom:"6px"}},"❓ CHECK"),
    React.createElement("div",{style:{fontSize:"16px",fontWeight:700,marginBottom:"14px",whiteSpace:"pre-line"}},step.question),
    React.createElement("input",{
      ref:inputRef, type:"text", className:cls, value:input,
      onChange:e=>setInput(e.target.value),
      onKeyDown:handleKey,
      placeholder:"Typ je antwoord...",
      disabled:!!result,
      style:{marginBottom:"10px"}}),
    result&&React.createElement("div",{style:{padding:"10px 14px",borderRadius:10,marginBottom:10,background:result.ok?"rgba(107,203,119,0.1)":"rgba(255,107,107,0.1)",border:"1px solid "+(result.ok?"rgba(107,203,119,0.3)":"rgba(255,107,107,0.3)")}},
      React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:result.ok?"#6bcb77":"#ff6b6b"}},result.ok?"✓ Correct!":"✗ Fout — juist antwoord: "+result.correct)),
    !result&&React.createElement("button",{
      style:{padding:"10px 16px",borderRadius:10,border:"none",background:"rgba(77,150,255,0.2)",color:"#4d96ff",fontSize:"13px",fontWeight:700},
      onClick:submit},"Controleer"));
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
