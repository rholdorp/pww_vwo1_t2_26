// ===== NORMALIZE for comparison =====
function normalize(s){return s.toLowerCase().trim().replace(/[''`]/g,"'").replace(/\s+/g," ").replace(/[.!?,;:]+$/,"")}

// Accept multiple correct answers separated by /
function checkAnswer(input,correctStr){
  const inp=normalize(input);
  if(!inp)return false;
  // Split on / for alternatives
  const alts=correctStr.split("/").map(a=>normalize(a));
  // Check exact match first
  if(alts.some(a=>a===inp))return true;
  // Check if answer is contained (for answers with extra info in parentheses)
  if(alts.some(a=>{
    // Strip parenthetical from correct: "slecht (in iets)" matches "slecht"
    const base=normalize(a.replace(/\s*\([^)]*\)/g,""));
    if(base&&base===inp)return true;
    // Also match if user typed the full thing
    return false;
  }))return true;
  return false;
}

// ===== QUESTION GENERATORS =====
function genVocQs(words,secId,n=10){
  const pool=[...words].sort(()=>Math.random()-0.5).slice(0,n);
  return pool.map(([en,nl])=>{
    if(Math.random()>0.5){
      return{prompt:en,answer:nl,direction:"EN → NL",hint:"Vertaal naar Nederlands",secId};
    } else {
      return{prompt:nl,answer:en,direction:"NL → EN",hint:"Translate to English",secId};
    }
  });
}

function genPastBeQs(n=10){
  return[...PS_BE_QS].sort(()=>Math.random()-0.5).slice(0,n).map(q=>({
    prompt:q.q,answer:q.a,direction:"Fill in",hint:"was of were?",secId:"pastbe"
  }));
}

function genPastRegQs(n=10){
  return[...REG_VERBS].sort(()=>Math.random()-0.5).slice(0,n).map(([base,past])=>({
    prompt:"Past Simple of '"+base+"':",answer:past,direction:"Conjugate",hint:"Typ de Past Simple vorm",secId:"pastreg"
  }));
}

function genMixQs(){
  return[
    ...genVocQs(U2,"unit2",4),
    ...genVocQs(U3,"unit3",4),
    ...genPastBeQs(3),
    ...genPastRegQs(4)
  ].sort(()=>Math.random()-0.5);
}

        React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(qIdx+1)+"/"+questions.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        pBar(((qIdx+1)/questions.length)*100,COL,"4px"),
        React.createElement("div",{style:{display:"flex",justifyContent:"center",gap:"16px",margin:"12px 0 16px"}},
          React.createElement("span",{style:{fontSize:"13px",color:"#6bcb77"}},"✓ "+score.correct),
          React.createElement("span",{style:{fontSize:"13px",color:"#ff6b6b"}},"✕ "+(score.total-score.correct))),
        React.createElement("div",{key:qIdx,className:"fade-in"},
          // Direction badge
          q.direction&&React.createElement("div",{style:{marginBottom:"8px"}},tag(COL,q.direction)),
          // Question prompt
          React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"24px 20px",border:"1px solid "+bdr,marginBottom:"16px",textAlign:"center"}},
            React.createElement("div",{style:{fontSize:"22px",fontWeight:800,lineHeight:1.5}},q.prompt),
            q.hint&&result===null&&React.createElement("div",{style:{fontSize:"12px",color:"#666",marginTop:"8px"}},q.hint)),
          // Input field
          React.createElement("input",{
            ref:inputRef,
            type:"text",
            value:input,
            onChange:e=>result===null&&setInput(e.target.value),
            onKeyDown:handleKey,
            className:result==="correct"?"correct":result==="wrong"?"wrong":"",
            placeholder:"Typ je antwoord...",
            autoFocus:true,
            autoComplete:"off",
            autoCapitalize:"off",
            spellCheck:false,
            readOnly:result!==null,
          }),
          // Result feedback
          result!==null&&React.createElement("div",{style:{marginTop:"12px",padding:"14px 16px",borderRadius:"12px",background:result==="correct"?"rgba(107,203,119,0.1)":"rgba(255,107,107,0.1)",border:"1px solid "+(result==="correct"?"#6bcb7730":"#ff6b6b30")}},
            result==="correct"
              ?React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:"#6bcb77"}},"✅ Correct!")
              :React.createElement("div",null,
                  React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:"#ff6b6b"}},"❌ Helaas!"),
                  React.createElement("div",{style:{fontSize:"14px",color:"#ccc",marginTop:"4px"}},"Goed antwoord: ",React.createElement("strong",{style:{color:"#fff"}},q.answer)),
                  React.createElement("div",{style:{fontSize:"12px",color:"#888",marginTop:"2px"}},"Jouw antwoord: ",input||"(leeg)"))),
          // Submit / Next button
          result===null
            ?React.createElement("button",{style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:input.trim()?COL:"rgba(255,255,255,0.06)",color:input.trim()?"#fff":"#555",fontSize:"15px",fontWeight:800,marginTop:"12px"},onClick:submitAnswer,disabled:!input.trim()},"Check ✓")
            :React.createElement("button",{style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:COL,color:"#fff",fontSize:"15px",fontWeight:800,marginTop:"12px"},onClick:nextQ},
              qIdx+1<questions.length?"Volgende →":"Bekijk resultaat")
        )));
  }

  // ===== RESULTS =====
  if(mode==="results"){
    const pct=score.total>0?Math.round(score.correct/score.total*100):0,passed=pct>=80;
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("div",{style:{maxWidth:"400px",padding:"20px",textAlign:"center"}},
        React.createElement("div",{style:{fontSize:"64px",marginBottom:"16px"}},passed?"🎉":"💪"),
        React.createElement("div",{style:{fontSize:"24px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},passed?"Well done!":"Keep going!"),
        React.createElement("div",{style:{fontSize:"48px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},pct+"%"),
        React.createElement("div",{style:{fontSize:"15px",color:"#999",marginBottom:"24px"}},score.correct+"/"+score.total+" correct"),
        wrongAnswers.length>0&&React.createElement("div",{style:{textAlign:"left",marginBottom:"16px"}},
          React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:"#ff6b6b",marginBottom:"8px"}},"❌ Wrong answers:"),
          wrongAnswers.map((w,i)=>React.createElement("div",{key:i,style:{background:"rgba(255,107,107,0.08)",border:"1px solid rgba(255,107,107,0.2)",borderRadius:"10px",padding:"10px 14px",marginBottom:"6px"}},
            React.createElement("div",{style:{fontSize:"13px",color:"#ccc"}},w.q),
            React.createElement("div",{style:{fontSize:"12px",color:"#ff6b6b",marginTop:"2px"}},"Your answer: "+w.chosen),
            React.createElement("div",{style:{fontSize:"12px",color:"#6bcb77",marginTop:"2px"}},"Correct: "+w.correct)))),
        DashboardLink.checkoffButton(dashTaskId,dashDate,pct),
        React.createElement("div",{style:{display:"flex",gap:"8px"}},
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"rgba(255,255,255,0.06)",color:"#999",fontSize:"14px",fontWeight:700},onClick:()=>setMode("home")},"\u2190 Back"),
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#fff",fontSize:"14px",fontWeight:800},onClick:()=>startPractice(activeSec)},"Again"))));
  }

  return null;
}

// Theory check with typing
function ThCheckTyping({step,secId}){
  const[input,setInput]=useState("");
  const[result,setResult]=useState(null);
  const handle=()=>{if(result!==null||!input.trim())return;const ok=checkAnswer(input,step.answer);setResult(ok?"correct":"wrong");progress.recordAnswer(secId,ok)};
  const onKey=e=>{if(e.key==="Enter")handle()};
  return React.createElement("div",{style:{background:"rgba(77,150,255,0.08)",borderRadius:"16px",padding:"20px",border:"1px solid rgba(77,150,255,0.2)"}},
    React.createElement("div",{style:{fontSize:"12px",color:"#4d96ff",fontWeight:700,marginBottom:"6px"}},"❓ CHECK"),
    React.createElement("div",{style:{fontSize:"18px",fontWeight:700,marginBottom:"6px"}},step.prompt),
    step.hint&&React.createElement("div",{style:{fontSize:"12px",color:"#888",marginBottom:"12px"}},step.hint),
    React.createElement("input",{type:"text",value:input,onChange:e=>result===null&&setInput(e.target.value),onKeyDown:onKey,className:result||"",placeholder:"Typ je antwoord...",autoComplete:"off",autoCapitalize:"off",spellCheck:false,readOnly:result!==null,style:{fontSize:"16px",padding:"12px 14px",borderRadius:"10px",border:"2px solid "+(result==="correct"?"#6bcb77":result==="wrong"?"#ff6b6b":"rgba(255,255,255,0.1)"),background:result==="correct"?"rgba(107,203,119,0.1)":result==="wrong"?"rgba(255,107,107,0.1)":"rgba(255,255,255,0.06)",color:"#fff",width:"100%",outline:"none",fontFamily:"inherit"}}),
    result==="wrong"&&React.createElement("div",{style:{fontSize:"13px",color:"#ff6b6b",marginTop:"8px"}},"Goed antwoord: ",React.createElement("strong",{style:{color:"#fff"}},step.answer)),
    result===null&&React.createElement("button",{style:{width:"100%",padding:"10px",borderRadius:"10px",border:"none",background:input.trim()?"#4d96ff":"rgba(255,255,255,0.06)",color:input.trim()?"#fff":"#555",fontSize:"13px",fontWeight:700,marginTop:"10px"},onClick:handle,disabled:!input.trim()},"Check ✓"));
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
