  return React.createElement("div",{style:{background:"rgba(77,150,255,0.08)",borderRadius:"16px",padding:"20px",border:"1px solid rgba(77,150,255,0.2)"}},
    React.createElement("div",{style:{fontSize:"12px",color:"#4d96ff",fontWeight:700,marginBottom:"6px"}},"❓ CHECK"),
    React.createElement("div",{style:{fontSize:"16px",fontWeight:700,marginBottom:"14px"}},step.question),
    step.options.map((opt,i)=>{const c=i===step.correct,s=picked===i,sh=picked!==null;let bg=cBg,b=bdr,cl="#ccc";if(sh&&c){bg="rgba(107,203,119,0.15)";b="#6bcb7750";cl="#6bcb77"}else if(sh&&s&&!c){bg="rgba(255,107,107,0.15)";b="#ff6b6b50";cl="#ff6b6b"}return React.createElement("button",{key:i,style:{width:"100%",padding:"12px 14px",borderRadius:"10px",border:"1px solid "+b,background:bg,color:cl,fontSize:"13px",fontWeight:600,textAlign:"left",marginBottom:"6px"},onClick:()=>handle(i)},(sh&&c?"✅ ":sh&&s?"❌ ":"")+opt)}));
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
