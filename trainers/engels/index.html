// ===== NORMALIZE for comparison =====
function normalize(s){return s.toLowerCase().trim().replace(/[''`]/g,"'").replace(/\s+/g," ").replace(/[.!?,;:]+$/,"")}

// Accept multiple correct answers separated by /
function checkAnswer(input,correctStr){
  const inp=normalize(input);
  if(!inp)return false;
  // Split on / for alternatives
  const alts=correctStr.split("/").map(a=>normalize(a));
  // Check exact match first
  if(alts.some(a=>a===inp))return true;
  // Check if answer is contained (for answers with extra info in parentheses)
  if(alts.some(a=>{
    // Strip parenthetical from correct: "slecht (in iets)" matches "slecht"
    const base=normalize(a.replace(/\s*\([^)]*\)/g,""));
    if(base&&base===inp)return true;
    // Also match if user typed the full thing
    return false;
  }))return true;
  return false;
}

// ===== QUESTION GENERATORS =====
function genVocQs(words,secId,n=10){
  const pool=[...words].sort(()=>Math.random()-0.5).slice(0,n);
  return pool.map(([en,nl,desc])=>{
    const r=Math.random();
    if(desc&&r<0.5){
      // Description → English word
      return{prompt:desc,answer:en,direction:"Description → Word",hint:"Which word is described here?",secId};
    } else if(r<0.75){
      return{prompt:en,answer:nl,direction:"EN → NL",hint:"Vertaal naar Nederlands",secId};
    } else {
      return{prompt:nl,answer:en,direction:"NL → EN",hint:"Translate to English",secId};
    }
  });
}

function genPastBeQs(n=10){
  return[...PS_BE_QS].sort(()=>Math.random()-0.5).slice(0,n).map(q=>({
    prompt:q.q,answer:q.a,direction:"Fill in",hint:"was of were?",secId:"pastbe"
  }));
}

function genPastRegQs(n=10){
  return[...REG_VERBS].sort(()=>Math.random()-0.5).slice(0,n).map(([base,past])=>({
    prompt:"Past Simple of '"+base+"':",answer:past,direction:"Conjugate",hint:"Typ de Past Simple vorm",secId:"pastreg"
  }));
}

function genMixQs(){
  return[
    ...genVocQs(U2,"unit2",3),
    ...genVocQs(U3,"unit3",3),
    ...genPastBeQs(2),
    ...genPastRegQs(3),
    ...genDiagQs().slice(0,4),
  ].sort(()=>Math.random()-0.5);
}
