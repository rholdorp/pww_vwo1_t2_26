function App() {
  const [version, setVersion] = useState(0);
  useEffect(()=>{progress.onUpdate(()=>setVersion(v=>v+1));},[]);
  const [mode, setMode] = useState("home"); // home, theory, practice, quiz
  const [activeSec, setActiveSec] = useState(null);
  const [step, setStep] = useState(0);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [answered, setAnswered] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [quizMode, setQuizMode] = useState(null); // 'practice' or 'quiz'

  // Force re-render when progress updates
  const [, forceUpdate] = useState(0);

  const bdr = "rgba(255,255,255,0.06)", cBg = "rgba(255,255,255,0.04)";
  const COL = "#E67E22";

  const tag = (c, txt) => React.createElement("span", { style: { display: "inline-block", padding: "2px 8px", borderRadius: "6px", fontSize: "10px", fontWeight: 700, background: c + "20", color: c } }, txt);
  const pBar = (pct, c, h) => React.createElement("div", { style: { height: h || "6px", borderRadius: "3px", background: "rgba(255,255,255,0.06)", position: "relative", overflow: "hidden" } }, React.createElement("div", { style: { position: "absolute", top: 0, left: 0, height: "100%", width: Math.min(pct, 100) + "%", background: c || COL, borderRadius: "3px", transition: "width 0.6s" } }));

  const startTheory = (secId) => { setActiveSec(secId); setStep(0); setMode("theory"); };
  const startPractice = (secId) => {
    setActiveSec(secId);
    const qs = [...PRACTICE[secId]].sort(() => Math.random() - 0.5).slice(0, 10);
    setQuestions(qs); setQIdx(0); setScore({ correct: 0, total: 0 }); setAnswered(null);
    setQuizMode("practice"); setMode("practice");
  };
  const startFinalQuiz = () => {
    const allQs = [];
    Object.keys(PRACTICE).forEach(secId => {
      PRACTICE[secId].forEach(q => allQs.push({ ...q, secId }));
