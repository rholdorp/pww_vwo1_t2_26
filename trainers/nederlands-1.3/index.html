      const selected = picked === i;
      const show = picked !== null;
      let bg = "rgba(255,255,255,0.04)", brd = "rgba(255,255,255,0.06)", col = "#ccc";
      if (show && correct) { bg = "rgba(107,203,119,0.15)"; brd = "#6bcb7750"; col = "#6bcb77"; }
      else if (show && selected && !correct) { bg = "rgba(255,107,107,0.15)"; brd = "#ff6b6b50"; col = "#ff6b6b"; }
      return React.createElement("button", { key: i, style: { width: "100%", padding: "12px 14px", borderRadius: "10px", border: "1px solid " + brd, background: bg, color: col, fontSize: "13px", fontWeight: 600, textAlign: "left", marginBottom: "6px" }, onClick: () => handle(i) },
        (show && correct ? "✅ " : show && selected ? "❌ " : "") + opt);
    }));
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
