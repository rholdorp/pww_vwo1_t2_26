"5.1":[
  {type:"explain",title:"Lijnstuk, lijn en halve lijn",text:"Een **LIJNSTUK** is de kortste verbinding tussen twee punten.\nBijv. lijnstuk AB — A en B zijn de eindpunten.\n\nEen **LIJN** ontstaat als je een lijnstuk aan beide kanten oneindig verlengt.\n→ Een lijn heeft **GEEN** eindpunten.\n→ We noteren een lijn met een kleine letter, bijv. lijn k.\n\nEen **HALVE LIJN** ontstaat als je een lijnstuk aan één kant verlengt.\n→ Een halve lijn heeft **ÉÉN** eindpunt.\n\nSamenvatting:\n• Lijnstuk: **2** eindpunten\n• Lijn: **0** eindpunten\n• Halve lijn: **1** eindpunt"},
  {type:"explain",title:"Loodlijnen en evenwijdige lijnen",text:"**LOODRECHT (⊥)**\nTwee lijnen staan loodrecht op elkaar als ze een rechte hoek (90°) maken.\nNotatie: l ⊥ m ('l staat loodrecht op m')\nHet tekentje ⊢ in de figuur = rechtehoekteken.\n\n**EVENWIJDIG (//**)\nEvenwijdige lijnen hebben dezelfde richting en snijden elkaar NIET.\nNotatie: l // m ('l is evenwijdig met m')\nAan de pijltjes (→→) kun je zien welke lijnen evenwijdig zijn.\n\nTekenen:\n• Loodlijn: gebruik de loodlijn van je geodriehoek\n• Evenwijdige lijn: gebruik de lange zijde van je geodriehoek"},

"5.2":[
  {type:"explain",title:"Soorten hoeken",text:"Twee halve lijnen met hetzelfde eindpunt vormen een **HOEK**.\nDe halve lijnen zijn de **benen** van de hoek.\nHet gemeenschappelijke eindpunt is het **hoekpunt**.\n\n4 soorten hoeken:\n📐 **RECHTE HOEK** = precies 90°\n🔹 **SCHERPE HOEK** = tussen 0° en 90°\n🔸 **STOMPE HOEK** = tussen 90° en 180°\n➖ **GESTREKTE HOEK** = precies 180° (rechte lijn)"},
  {type:"explain",title:"Graden en de klok",text:"Hoeken meten we in **graden**.\n\nEen rechte hoek = **90°**\nEen gestrekte hoek = **180°**\nEen kwartslag = 90°, halve slag = 180°, hele slag = **360°**.\n\n🕐 Klok:\n• Grote wijzer: 360° per uur = **6°** per minuut\n• Kleine wijzer: 360° per 12 uur = **30°** per uur = 0,5° per minuut\n\nVoorbeelden:\nOm 3 uur → 90° (rechte hoek)\nOm 6 uur → 180° (gestrekte hoek)\nOm 5 uur → 150° (stompe hoek)\nOm 1 uur → 30° (scherpe hoek)"},

"5.3":[
  {type:"explain",title:"Hoeken meten met je geodriehoek",text:"**Werkschema:**\n\n**1.** Leg je geodriehoek op het hoekpunt.\nLeg het streepje bij de 0 op het hoekpunt.\n\n**2.** Leg de lange kant langs één been van de hoek.\nZorg dat het andere been onder de gradenboog ligt.\n\n**3.** Lees het aantal graden af bij het andere been.\nEr staan **TWEE** getallen — kies het juiste!\n\n**4.** Kies scherp of stomp:\n• Scherpe hoek → kies het kleinere getal\n• Stompe hoek → kies het grotere getal\n\nVoorbeeld: je leest af 53° en 127°.\nDe hoek is scherp → ∠A = 53°.\n\n💡 De twee getallen tellen altijd op tot **180°**!"},

"5.4":[
  {type:"explain",title:"Hoeken tekenen met je geodriehoek",text:"**Werkschema** voor het tekenen van een hoek van 130°:\n\n**1.** Teken een punt A en een been van de hoek.\n\n**2.** Leg de lange kant langs het been.\nLeg het 0-streepje op punt A.\n\n**3.** Zoek het getal 130 op de gradenboog.\n130° is stomp → kies de kant die een stompe hoek oplevert.\nZet daar een stip.\n\n**4.** Teken het tweede been door de stip.\n\n💡 **Driehoeken tekenen:**\nAls je twee hoeken en de zijde ertussen kent:\n1. Teken de zijde\n2. Teken de ene hoek bij het ene eindpunt\n3. Teken de andere hoek bij het andere eindpunt\n4. Waar de benen snijden = het derde hoekpunt"},

"5.5":[
  {type:"explain",title:"Drie rekenregels",text:"Bij het berekenen van hoeken gebruik je drie regels:\n\n**1️⃣ Een RECHTE HOEK is 90°**\n∠A₁ + ∠A₂ = 90° (als ze samen een rechte hoek vormen)\n\n**2️⃣ Een GESTREKTE HOEK is 180°**\n∠B₁ + ∠B₂ = 180° (als ze samen een gestrekte hoek vormen)\n\n**3️⃣ OVERSTAANDE HOEKEN zijn even groot**\nBij twee snijdende lijnen:\nDe hoeken die tegenover elkaar liggen zijn gelijk.\n∠S₁ = ∠S₃  en  ∠S₂ = ∠S₄"},
  {type:"example",title:"Voorbeeld",text:"Gegeven: ∠A₁ = 42° en ∠A₃ = 90°.\n∠A₁₂₃ is een gestrekte hoek (180°).\n\nBereken ∠A₂:\n∠A₂ = 180° − 42° − 90° = **48°** (gestrekte hoek)\n\nBereken ∠A₄:\n∠A₄ = ∠A₁ = **42°** (overstaande hoeken)\n\nBereken ∠A₅:\n∠A₅ = ∠A₂₃ = 48° + 90° = **138°** (overstaande hoeken)\n\n💡 Zet bij elke berekening de gebruikte regel tussen haakjes!"},
  {type:"check",q:"∠A₁ = 42° en vormt samen met ∠A₂ een gestrekte hoek. ∠A₂ = ?",answer:138,hint:"180° − 42° = 138°"},
  {type:"check",q:"∠B₁ = 53° en vormt samen met ∠B₂ een rechte hoek. ∠B₂ = ?",answer:37,hint:"90° − 53° = 37°"},

"5.6":[
  {type:"explain",title:"Hoekensom driehoek",text:"In elke driehoek is de som van de drie hoeken **180°**.\n\n∠D + ∠E + ∠F = 180° (hoekensom driehoek)\n\nAls je twee hoeken kent → bereken de derde.\n\nVoorbeeld:\nVan △DEF: ∠D = 40° en ∠F = 60°.\n∠E = 180° − 40° − 60° = **80°** (hoekensom driehoek)"},
  {type:"explain",title:"Hoekensom vierhoek",text:"In elke vierhoek is de som van de vier hoeken **360°**.\n\nWaarom? Een diagonaal verdeelt de vierhoek in twee driehoeken.\n2 × 180° = **360°**\n\nVoorbeeld:\nVan PQRS: ∠P = 76°, ∠Q = 108°, ∠S = 98°.\n∠R = 360° − 76° − 108° − 98° = **78°** (hoekensom vierhoek)"},
  {type:"explain",title:"Figuren met meerdere driehoeken",text:"In figuren met meerdere driehoeken heb je vaak tussenstappen nodig.\n\nAlle regels op een rij:\n• Rechte hoek: **90°**\n• Gestrekte hoek: **180°**\n• Overstaande hoeken: **even groot**\n• Hoekensom driehoek: **180°**\n• Hoekensom vierhoek: **360°**\n\n💡 Zet altijd de gebruikte regel tussen haakjes achter je berekening!"},
  {type:"check",q:"∠D = 40° en ∠F = 60° in △DEF. Bereken ∠E.",answer:80,hint:"180° − 40° − 60° = 80° (hoekensom driehoek)"},
  {type:"check",q:"∠P = 76°, ∠Q = 108°, ∠S = 98° in vierhoek PQRS. Bereken ∠R.",answer:78,hint:"360° − 76° − 108° − 98° = 78° (hoekensom vierhoek)"},
],
"6.1":[
  {type:"explain",title:"Wat is een kwadraat?",text:"Het **kwadraat** van een getal bereken je door het getal met zichzelf te vermenigvuldigen.\n\nHet kwadraat van 7 is **7² = 7 × 7 = 49**.\nHet kwadraat van 15 is **15² = 15 × 15 = 225**.\n\nWe schrijven dit als 7² (spreek uit: 'zeven kwadraat')."},
  {type:"example",title:"Voorbeeld: kwadraten berekenen",text:"6² = 6 × 6 = **36**\n(⅔)² = ⅔ × ⅔ = **4/9**\n\nBij berekeningen gaat kwadrateren vóór vermenigvuldigen en delen:\n2 · 3² = 2 · 9 = **18** (eerst kwadrateren!)"},

  {type:"check",q:"Bereken: 2 · 5²",answer:50,hint:"Eerst kwadrateren: 5² = 25\nDan: 2 × 25 = 50"},

  {type:"check",q:"Bereken: (3 + 2)²",answer:25,hint:"Eerst haakjes: 3 + 2 = 5\nDan kwadrateren: 5² = 25"},

  {type:"example",title:"Voorbeelden met mintekens",text:"(−3)² = (−3) × (−3) = **9**\n−3² = −(3 × 3) = **−9**\n\n−8² + (−7)² = −64 + 49 = **−15**"},

  {type:"explain",title:"De wortel",text:"De **wortel** is het omgekeerde van kwadrateren.\n\n**√25 = 5**, want 5² = 25\n**√81 = 9**, want 9² = 81\n\nStandaard wortels:\n√1=1, √4=2, √9=3, √16=4, √25=5\n√36=6, √49=7, √64=8, √81=9\n√100=10, √121=11, √144=12"},
  {type:"check",q:"Bereken: √49",answer:7,hint:"√49 = 7, want 7² = 49"},

"6.2":[
  {type:"explain",title:"Wat zijn kwadratische formules?",text:"Formules zoals:\n• y = x² − 8\n• y = −3x²\n• y = (x − 7)²\n• A = 2n²\n\nzijn **kwadratische formules**. Ze bevatten altijd een kwadraat van de variabele."},
  {type:"example",title:"Voorbeeld: waarden berekenen",text:"Gegeven: **y = x² + 4**\n\nVoor x = 5: y = 25 + 4 = **29**\nVoor x = −5: y = (−5)² + 4 = 25 + 4 = **29**\n\n⚠️ Gebruik haakjes bij negatieve getallen!"},

"6.3":[
  {type:"explain",title:"De grafiek van een kwadratische formule",text:"De grafiek van een kwadratische formule (met x²) is altijd een **parabool** — een U-vorm.\n\nDe grafiek van een lineaire formule (zonder x²) is altijd een **rechte lijn**.\n\n**Parabool tekenen:**\n1. Maak een tabel met **7 punten**\n2. Teken de punten\n3. Teken een **vloeiende kromme**"},
  {type:"example",title:"Tabel invullen",text:"y = x² − 2:\n\nx = −3: y = 9−2 = **7**\nx = −2: y = 4−2 = **2**\nx = −1: y = 1−2 = **−1**\nx = 0: y = 0−2 = **−2**\nx = 1: y = 1−2 = **−1**\nx = 2: y = 4−2 = **2**\nx = 3: y = 9−2 = **7**\n\nx=3 en x=−3 geven dezelfde y!"},

  {type:"check",q:"Is y = 3x + 7 lineair of kwadratisch?",answer:"lineair",type2:"choice",options:["lineair","kwadratisch"],hint:"Geen x² → lineair!"},

"6.4":[

  {type:"example",title:"Voorbeelden",text:"5n · −4k · 2m = **−40kmn**\n5x · −x = **−5x²** (x · x = x²)\n\n**Speciale gevallen:**\n0 · a = **0**\n1 · a = **a**\n−1 · a = **−a**\na · a = **a²**"},
  {type:"check",q:"Herleid: 3a · 7b",answer:"21ab",type2:"text",hint:"3×7=21, letters: ab → 21ab"},
  {type:"check",q:"Herleid: −4p · −2q",answer:"8pq",type2:"text",hint:"−4×−2=8, letters: pq → 8pq"},

"6.6":[

    );
  }

  // RESULTS
  if(screen==="results"){const sec=getSection(section),pct=Math.round(session.c/session.t*100),ok=pct>=70;
    return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#0c0c20,#141432 40%,#0e0e28)"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.25)",padding:"14px 20px",borderBottom:"1px solid "+bdr}},React.createElement("div",{style:{fontSize:"18px",fontWeight:900,background:"linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",textAlign:"center"}},"Resultaten")),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 16px"}},
        React.createElement("div",{style:{background:cBg,borderRadius:"18px",padding:"28px 20px",border:"1px solid "+bdr,textAlign:"center"}},
          React.createElement("div",{style:{fontSize:"64px",marginBottom:"12px"}},ok?"🎉":"💪"),
          React.createElement("div",{style:{fontSize:"32px",fontWeight:900,color:ok?"#6bcb77":"#ffd93d"}},pct+"%"),
          React.createElement("div",{style:{fontSize:"18px",fontWeight:700,marginTop:"4px"}},session.c+" van "+session.t+" goed"),
          React.createElement("div",{style:{fontSize:"14px",color:"#888",marginTop:"8px"}},ok?"§"+section+" beheerst! Ga door naar het volgende onderwerp.":"Je hebt ≥70% nodig. Bestudeer de theorie en probeer opnieuw!"),
          React.createElement("div",{style:{display:"flex",gap:"8px",marginTop:"20px",justifyContent:"center"}},
            React.createElement("button",{style:{padding:"10px 20px",borderRadius:"12px",border:"2px solid "+sec.color,background:"transparent",color:sec.color,fontSize:"14px",fontWeight:700,cursor:"pointer"},onClick:()=>startTheory(section)},"📖 Theorie"),
            React.createElement("button",{style:{padding:"10px 20px",borderRadius:"12px",border:"none",background:sec.color,color:"#fff",fontSize:"14px",fontWeight:700,cursor:"pointer"},onClick:()=>startQuiz(section,level)},"🔄 Opnieuw")
          ),
          React.createElement("button",{style:{width:"100%",padding:"12px",borderRadius:"10px",border:"none",background:"rgba(255,255,255,0.05)",color:"#aaa",fontSize:"13px",fontWeight:600,cursor:"pointer",marginTop:"12px"},onClick:()=>setScreen("home")},"← Terug naar overzicht")
        )
      )
    );
  }
  return null;
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
