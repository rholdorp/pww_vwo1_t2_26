"5.1":[
  {type:"explain",title:"Lijnstuk, lijn en halve lijn",text:"Een **LIJNSTUK** is de kortste verbinding tussen twee punten.\nBijv. lijnstuk AB — A en B zijn de eindpunten.\n\nEen **LIJN** ontstaat als je een lijnstuk aan beide kanten oneindig verlengt.\n→ Een lijn heeft **GEEN** eindpunten.\n→ We noteren een lijn met een kleine letter, bijv. lijn k.\n\nEen **HALVE LIJN** ontstaat als je een lijnstuk aan één kant verlengt.\n→ Een halve lijn heeft **ÉÉN** eindpunt.\n\nSamenvatting:\n• Lijnstuk: **2** eindpunten\n• Lijn: **0** eindpunten\n• Halve lijn: **1** eindpunt"},
  {type:"explain",title:"Loodlijnen en evenwijdige lijnen",text:"**LOODRECHT (⊥)**\nTwee lijnen staan loodrecht op elkaar als ze een rechte hoek (90°) maken.\nNotatie: l ⊥ m ('l staat loodrecht op m')\nHet tekentje ⊢ in de figuur = rechtehoekteken.\n\n**EVENWIJDIG (//**)\nEvenwijdige lijnen hebben dezelfde richting en snijden elkaar NIET.\nNotatie: l // m ('l is evenwijdig met m')\nAan de pijltjes (→→) kun je zien welke lijnen evenwijdig zijn.\n\nTekenen:\n• Loodlijn: gebruik de loodlijn van je geodriehoek\n• Evenwijdige lijn: gebruik de lange zijde van je geodriehoek"},

// Normalize algebra expressions for comparison: strip spaces, split terms, sort alphabetically
function normalizeAlgebra(s){
  s=String(s).replace(/\s/g,"").toLowerCase();
  // Split on + and - while keeping the sign
  var terms=[];var cur="";
  for(var i=0;i<s.length;i++){
    if(i>0&&(s[i]==="+"||s[i]==="\u2212"||s[i]==="-")){terms.push(cur);cur=s[i]==="+"?"":s[i]}
    else cur+=s[i];
  }
  if(cur)terms.push(cur);
  terms.sort();
  return terms.join("+").replace(/\+\u2212/g,"\u2212").replace(/\+-/g,"-");
}

// ========== QUESTION GENERATORS (loaded from generators-h5.js and generators-h6.js) ==========
// g51-g66 are global functions, no level parameter (diagnostic only)
function genQ(section,difficulty){
  const g={"5.1":g51,"5.2":g52,"5.3":g53,"5.4":g54,"5.5":g55,"5.6":g56,"6.1":g61,"6.2":g62,"6.3":g63,"6.4":g64,"6.5":g65,"6.6":g66};
  if(difficulty){
    // Progressive difficulty: constrain the type (t) selection in generators
    // All generators start with var t = rand(1, N) as first rand call
    const maxTypes={"5.2":12,"5.5":22,"5.6":20,"6.3":40};
    const maxT=maxTypes[section]||10;
    let lo,hi;
    if(maxT>20){
      // Large generators (6.3 with 40 types): wider ranges
      if(difficulty===1){lo=1;hi=Math.min(10,maxT)}
      else if(difficulty===2){lo=Math.min(8,maxT);hi=Math.min(25,maxT)}
      else{lo=Math.min(20,maxT);hi=maxT}
    } else {
      if(difficulty===1){lo=1;hi=Math.min(4,maxT)}
      else if(difficulty===2){lo=Math.min(3,maxT);hi=Math.min(8,maxT)}
      else{lo=Math.min(6,maxT);hi=maxT}
    }
    const origRand=window.rand;
    let first=true;
    window.rand=function(a,b){if(first&&a===1&&b>=8){first=false;return origRand(lo,hi)}first=false;return origRand(a,b)};
    const q=g[section]();
    window.rand=origRand;
    return q;
  }
  return g[section]();
}
// Generate a unique question (not in the usedSet)
function genUniqueQ(section,usedSet,maxTries,difficulty){
  maxTries=maxTries||30;
  for(var i=0;i<maxTries;i++){
    var q=genQ(section,difficulty);
    var key=q.q+"|"+String(q.a);
    if(!usedSet.has(key)){usedSet.add(key);return q;}
  }
  return genQ(section,difficulty); // fallback
}
