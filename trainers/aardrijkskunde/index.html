    {q:"Wat is een schildvulkaan?",a:"Grote platte vulkaan met flauwe hellingen",opts:["Grote platte vulkaan met flauwe hellingen","Steile, kegelvormige vulkaan","Vulkaan met caldera","Onderzeese vulkaan"]},
  ],
};

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}
function genQs(secId){
  const pool=QUESTIONS[secId]||[];
  return shuffle(pool).slice(0,10).map(q=>{
    const opts=shuffle(q.opts);
    return{q:q.q,opts,correct:opts.indexOf(q.a)};
  });
}
function pBar(pct,col,h){
  return React.createElement("div",{style:{background:"rgba(255,255,255,0.06)",borderRadius:"99px",height:h||"6px",overflow:"hidden"}},
    React.createElement("div",{style:{width:pct+"%",height:"100%",background:col,borderRadius:"99px",transition:"width 0.4s ease"}}));
}

function App(){
  const[mode,setMode]=useState("home");
  const[activeSec,setActiveSec]=useState(null);
  const[step,setStep]=useState(0);
  const[questions,setQuestions]=useState([]);
  const[qIdx,setQIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[score,setScore]=useState({correct:0,total:0});
  const[,forceUpdate]=useState(0);

  function startTheory(secId){
    setActiveSec(secId);setStep(0);setMode("theory");
  }
  function startPractice(secId){
    setActiveSec(secId);
    const qs=genQs(secId);
    setQuestions(qs);setQIdx(0);setSelected(null);setScore({correct:0,total:0});setMode("practice");
  }
  function nextQ(){
    if(qIdx+1>=questions.length){setMode("results");return;}
    setQIdx(q=>q+1);setSelected(null);
  }
  function handleAnswer(idx){
    if(selected!==null)return;
    setSelected(idx);
    const q=questions[qIdx];
    const ok=idx===q.correct;
    progress.recordAnswer(activeSec,ok);
    setScore(s=>({correct:s.correct+(ok?1:0),total:s.total+1}));
    forceUpdate(n=>n+1);
  }

  // ===== HOME =====
  if(mode==="home"){
    const stats=progress.getOverallStats();
    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",alignItems:"center",gap:"12px",position:"sticky",top:0,zIndex:50}},
        React.createElement("a",{href:"../../index.html",style:{background:"none",border:"none",color:"#666",fontSize:"16px",textDecoration:"none"}},"←"),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{style:{fontSize:"16px",fontWeight:800,color:COL}},"🌍 Aardrijkskunde"),
          React.createElement("div",{style:{fontSize:"11px",color:"#666"}},"H4: Natuurrampen in Japan")),
        React.createElement("div",{style:{fontSize:"12px",color:COL,fontWeight:700}},stats.mastered+"/"+SECTIONS.length+" ✓")),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"16px 14px 60px"}},
        React.createElement("div",{style:{background:"rgba(241,196,15,0.06)",borderRadius:"16px",padding:"16px",border:"1px solid rgba(241,196,15,0.15)",marginBottom:"20px"}},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}},
            React.createElement("span",{style:{fontSize:"13px",fontWeight:700,color:COL}},"Totale voortgang"),
            React.createElement("span",{style:{fontSize:"13px",color:COL,fontWeight:800}},stats.masteryPct+"%")),
          pBar(stats.masteryPct,COL),
          React.createElement("div",{style:{fontSize:"11px",color:"#666",marginTop:"6px"}},stats.mastered+" van "+SECTIONS.length+" secties gemeesterd (≥5 vragen, ≥70% goed)")),
        React.createElement("div",{style:{fontSize:"12px",color:"#555",fontWeight:700,margin:"0 0 10px 4px"}},"📚 SECTIES — H4 Natuurrampen in Japan"),
        SECTIONS.map(sec=>{
          const sp=progress.getSection(sec.id);
          const pct=sp.total>0?Math.round(sp.correct/sp.total*100):0;
          const mastered=progress.isMastered(sec.id);
          return React.createElement("div",{key:sec.id,style:{background:cBg,borderRadius:"14px",padding:"14px",border:"1px solid "+(mastered?"rgba(241,196,15,0.3)":bdr),marginBottom:"10px"}},
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}},
              React.createElement("span",{style:{fontSize:"22px"}},sec.icon),
              React.createElement("div",{style:{flex:1}},
                React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:mastered?COL:"#ddd"}},sec.title),
                React.createElement("div",{style:{fontSize:"11px",color:"#666"}},sec.desc)),
              mastered&&React.createElement("span",{style:{fontSize:"12px",color:COL,fontWeight:800}},"✓")),
            sp.total>0&&React.createElement("div",{style:{marginBottom:"8px"}},
              pBar(pct,COL,"4px"),
              React.createElement("div",{style:{fontSize:"10px",color:"#666",marginTop:"3px"}},sp.correct+" / "+sp.total+" goed ("+pct+"%)")),
            React.createElement("div",{style:{display:"flex",gap:"8px"}},
              React.createElement("button",{style:{flex:1,padding:"8px",borderRadius:"10px",border:"none",background:"rgba(255,255,255,0.06)",color:"#aaa",fontSize:"12px",fontWeight:700},onClick:()=>startTheory(sec.id)},"📖 Theorie"),
              React.createElement("button",{style:{flex:1,padding:"8px",borderRadius:"10px",border:"none",background:COL,color:"#111",fontSize:"12px",fontWeight:800},onClick:()=>startPractice(sec.id)},"⚡ Oefenen")));
        }),
        React.createElement("div",{style:{display:"flex",gap:"8px",marginTop:"16px"}},
          React.createElement("a",{href:"../../index.html",style:{flex:1,display:"block",padding:"10px",borderRadius:"10px",background:"rgba(255,255,255,0.03)",color:"#666",fontSize:"12px",fontWeight:600,textDecoration:"none",textAlign:"center"}},"← Terug"),
          React.createElement("button",{style:{padding:"10px 16px",borderRadius:"10px",border:"none",background:"rgba(255,255,255,0.03)",color:"#555",fontSize:"12px",fontWeight:600},onClick:()=>{if(confirm("Reset alle voortgang?")){progress.reset();forceUpdate(n=>n+1)}}},"🔄")
        )));
  }

  // ===== THEORY =====
  if(mode==="theory"){
    const steps=THEORY[activeSec];const sec=SECTIONS.find(s=>s.id===activeSec);
    const cs=steps[step];const isLast=step===steps.length-1;
    const renderText=(text)=>text.split("\n").map((line,i)=>{
      const parts=line.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
      return React.createElement("div",{key:i,style:{marginBottom:line===""?"8px":"4px"}},
        parts.map((p,j)=>{
          if(p.startsWith("**")&&p.endsWith("**"))return React.createElement("strong",{key:j,style:{color:"#fff"}},p.slice(2,-2));
          if(p.startsWith("*")&&p.endsWith("*"))return React.createElement("em",{key:j,style:{color:COL}},p.slice(1,-1));
          return React.createElement("span",{key:j},p);
        }));
    });

    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
        React.createElement("button",{style:{background:"none",border:"none",color:"#666",fontSize:"16px"},onClick:()=>setMode("home")},"✕"),
        React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:COL}},sec.icon+" "+sec.title),
        React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(step+1)+"/"+steps.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        pBar(((step+1)/steps.length)*100,COL,"4px"),
        React.createElement("div",{key:step,className:"fade-in",style:{marginTop:"20px"}},
          React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr}},
            React.createElement("div",{style:{fontSize:"12px",color:COL,fontWeight:700,marginBottom:"6px"}},"📖 THEORIE"),
            React.createElement("div",{style:{fontSize:"18px",fontWeight:800,marginBottom:"12px"}},cs.title),
            React.createElement("div",{style:{fontSize:"14px",lineHeight:1.8,color:"#ccc"}},renderText(cs.text))),
          React.createElement("div",{style:{display:"flex",gap:"8px",marginTop:"20px"}},
            step>0&&React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"rgba(255,255,255,0.06)",color:"#999",fontSize:"14px",fontWeight:700},onClick:()=>setStep(step-1)},"← Vorige"),
            React.createElement("button",{style:{flex:2,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#111",fontSize:"14px",fontWeight:800},onClick:()=>{
              if(isLast){progress.markTheoryDone(activeSec);forceUpdate(n=>n+1);setMode("home")}else setStep(step+1)
            }},isLast?"✅ Theorie afgerond!":"Volgende →"))
        )));
  }

  // ===== PRACTICE =====
  if(mode==="practice"){
    const q=questions[qIdx];const sec=activeSec?SECTIONS.find(s=>s.id===activeSec):null;
    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
        React.createElement("button",{style:{background:"none",border:"none",color:"#666",fontSize:"16px"},onClick:()=>setMode("home")},"✕"),
        React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:COL}},sec?sec.icon+" "+sec.title:"🌍 AK"),
        React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(qIdx+1)+"/"+questions.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        pBar(((qIdx+1)/questions.length)*100,COL,"4px"),
        React.createElement("div",{style:{display:"flex",justifyContent:"center",gap:"16px",marginTop:"12px",marginBottom:"16px"}},
          React.createElement("span",{style:{fontSize:"13px",color:"#6bcb77"}},"✓ "+score.correct),
          React.createElement("span",{style:{fontSize:"13px",color:"#ff6b6b"}},"✕ "+(score.total-score.correct))),
        React.createElement("div",{key:qIdx,className:"fade-in"},
          React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr,marginBottom:"16px"}},
            React.createElement("div",{style:{fontSize:"16px",fontWeight:700,lineHeight:1.5,color:"#fff"}},q.q)),
          q.opts.map((opt,i)=>{
            let bg="rgba(255,255,255,0.04)",col2="#ddd",bd=bdr;
            if(selected!==null){
              if(i===q.correct){bg="rgba(107,203,119,0.15)";col2="#6bcb77";bd="rgba(107,203,119,0.4)";}
              else if(i===selected){bg="rgba(255,107,107,0.12)";col2="#ff6b6b";bd="rgba(255,107,107,0.3)";}
            }
            return React.createElement("button",{key:i,style:{width:"100%",textAlign:"left",padding:"14px 16px",borderRadius:"12px",border:"1px solid "+bd,background:bg,color:col2,fontSize:"14px",fontWeight:600,marginBottom:"8px",display:"block"},onClick:()=>handleAnswer(i)},opt);
          }),
          selected!==null&&React.createElement("button",{style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:COL,color:"#111",fontSize:"15px",fontWeight:800,marginTop:"8px"},onClick:nextQ},
            qIdx+1>=questions.length?"Bekijk resultaat":"Volgende vraag →"))));
  }

  // ===== RESULTS =====
  if(mode==="results"){
    const pct=score.total>0?Math.round(score.correct/score.total*100):0;const passed=pct>=70;
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("div",{style:{maxWidth:"400px",padding:"20px",textAlign:"center"}},
        React.createElement("div",{style:{fontSize:"64px",marginBottom:"16px"}},passed?"🎉":"💪"),
        React.createElement("div",{style:{fontSize:"24px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},passed?"Goed gedaan!":"Nog even oefenen!"),
        React.createElement("div",{style:{fontSize:"48px",fontWeight:900,color:passed?"#6bcb77":"#ffd93d",marginBottom:"8px"}},pct+"%"),
        React.createElement("div",{style:{fontSize:"15px",color:"#999",marginBottom:"24px"}},score.correct+" van "+score.total+" correct"),
        React.createElement("div",{style:{display:"flex",gap:"8px"}},
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:"rgba(255,255,255,0.06)",color:"#999",fontSize:"14px",fontWeight:700},onClick:()=>setMode("home")},"← Terug"),
          React.createElement("button",{style:{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#111",fontSize:"14px",fontWeight:800},onClick:()=>startPractice(activeSec)},"Opnieuw"))));
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
