async function fetchStudiePlan(user){
  if(!window.FB)return null;
  try{
    const snap=await window.FB.db.ref("users/"+user+"/studieplan").once("value");
    return snap.exists()?snap.val():null;
  }catch{return null;}
}
async function fetchTrainerStats(user){
  if(!window.FB)return loadAllTrainerStats();
  try{
    const snap=await window.FB.db.ref("users/"+user+"/trainers").once("value");
    if(!snap.exists())return loadAllTrainerStats();
    const fb=snap.val()||{};
    const res={};
    Object.entries(TRAINER_META).forEach(([subj,meta])=>{
      const fbKey=meta.key.replace(/\./g,",");
      const data=fb[fbKey];
      if(!data){res[subj]=null;return;}
      const secs=meta.fmt==="flat"?data:(data.sections||{});
      let mastered=0,totC=0,totA=0;const secData={};
      Object.entries(secs).forEach(([sid,s])=>{
        if(!s)return;
        totA+=s.total||0;totC+=s.correct||0;
        const m=(s.lastQuizPct||0)>=70;
        if(m)mastered++;
        secData[sid]={correct:s.correct||0,total:s.total||0,pct:s.total>0?Math.round((s.correct||0)/s.total*100):0,mastered:m};
      });
      res[subj]={mastered,n:meta.n,pct:Math.round(mastered/meta.n*100),
                 acc:totA>0?Math.round(totC/totA*100):0,started:totA>0,secData};
    });
    return res;
  }catch{return loadAllTrainerStats();}
}

function loadAllTrainerStats(){
  const res={};
  Object.entries(TRAINER_META).forEach(([subj,meta])=>{
    try{
      const raw=localStorage.getItem(meta.key);
      if(!raw){res[subj]=null;return;}
      const data=JSON.parse(raw);
      if(!data){res[subj]=null;return;}
      const secs=meta.fmt==="flat"?data:(data.sections||{});
      let mastered=0,totC=0,totA=0;const secData={};
      Object.entries(secs).forEach(([sid,s])=>{
        if(!s)return;
        totA+=s.total||0;totC+=s.correct||0;
        const m=(s.lastQuizPct||0)>=70;
        if(m)mastered++;
        secData[sid]={correct:s.correct||0,total:s.total||0,pct:s.total>0?Math.round((s.correct||0)/s.total*100):0,mastered:m};
      });
      res[subj]={mastered,n:meta.n,pct:Math.round(mastered/meta.n*100),
                 acc:totA>0?Math.round(totC/totA*100):0,started:totA>0,secData};
    }catch{res[subj]=null;}
  });
  return res;
}
